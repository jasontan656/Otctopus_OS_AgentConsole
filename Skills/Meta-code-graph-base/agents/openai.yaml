interface:
  display_name: "Meta-code-graph-base"
  short_description: "维护本地代码图谱底座，提供 analyze/query/context/impact/detect-changes/resource/wiki 等能力。"
  default_prompt: "先读取 Meta-code-graph-base 的 SKILL.md，按其中的 analyze/query/status 等入口执行。调用前必须显式提供 `--runtime-root <abs/runtime/root>` 或 `META_CODE_GRAPH_RUNTIME_ROOT`；若没有 runtime root，直接停止并提示补充，不得擅自选默认落点。不要把前端展示合同混入代码图谱底座能力。"
