interface:
  display_name: "4 Octupos Os Frontend"
  short_description: "前端项目说明驱动开发：目录化 mother doc、construction packs、受控 implementation、真实前端 acceptance。"
  default_prompt: "固定按四阶段执行：mother_doc -> construction_plan -> implementation -> acceptance。若 workspace 下的 OctuposOS_RunTime_Frontend/docs/mother_doc 不存在，先运行 mother-doc-init 创建骨架；然后先读取 00_index.md。若 workspace 下的 OctuposOS_RunTime_Frontend/docs 已经存在编号归档的 NN_slug，先读取最新一轮归档并抽取仍然有效的目标、架构决策、blocker 与交付增量，再结合 code graph/context 回填当前 mother_doc。mother-doc-lint 通过前，不得进入 construction_plan；mother doc 内的 08_dev_execution_plan.md 只表示设计者规划，不等于 AI 的施工 packs。construction_plan 阶段必须在 OctuposOS_RunTime_Frontend/docs/mother_doc/ 内生成 `execution_atom_plan_validation_packs/`，并按 01_xxx/02_xxx 编号拆成独立 pack 目录；每个 pack 同时承载 markdown anchors 与 machine files（pack_manifest.yaml、inner_phase_plan.json、phase_status.jsonl、evidence_registry.json）。implementation 必须严格按当前 active pack 与 inner phase 施工并边施工边分域回填。只有 acceptance/evidence 收口时才允许执行 mother-doc-archive，把当前 mother_doc 顺序归档成下一个 NN_slug 目录并重建新的 docs/mother_doc。单阶段执行时不要读取其他阶段规范；多阶段执行时，切换阶段后丢弃上一阶段 instruction focus，并重新读取当前阶段 checklist。用户若通过问答回填 mother doc，优先给结构化选项与有界追问。发现范围只允许固定前端 codebase、frontend runtime、docs 与必要 skill 文件；不得扫描整个 AI_Projects workspace。"
