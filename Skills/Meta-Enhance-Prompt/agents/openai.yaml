interface:
  display_name: Meta-Enhance-Prompt
  short_description: Clarify the user's real need into one reusable INTENT block and publish only that filtered intent output.
  default_prompt: Use $Meta-Enhance-Prompt. First run `./.venv_backend_skills/bin/python Skills/Meta-Enhance-Prompt/scripts/Cli_Toolbox.py contract --json`. Treat CLI JSON as the primary runtime source and use markdown mirrors only when the contract still leaves a real gap. If the user provides `codex id/session id/resume id` and asks to read chat history first, call `./.venv_backend_skills/bin/python Skills/Meta-Enhance-Prompt/scripts/Cli_Toolbox.py read-session-context --lookup-key <rollout_key> --lookup-id <id> --json` (or the direct `--codex-id/--session-id/--resume-id` aliases) before any further strengthening, analysis, or answer drafting. Treat that id as pre-read conversation context rather than as part of the prompt to strengthen. For requests like `先阅读 codex id : xxxx 的最后一轮助理回复，理解上下文后，帮我强化如下prompt:("xxx")`, only strengthen `xxx` and publish only the final `INTENT:` content after understanding that context.
