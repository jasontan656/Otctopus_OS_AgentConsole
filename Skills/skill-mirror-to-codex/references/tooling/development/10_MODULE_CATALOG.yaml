version: 1
modules:
  - module_id: cli_toolbox_sync
    entrypoint: scripts/Cli_Toolbox.py
    capabilities:
      - Cli_Toolbox.sync_mirror_to_codex
    scope:
      range:
        - all
        - skill
      modes:
        - auto
        - push
        - install
        - rename
      skill_path_policy:
        shape: relative_nested_path
        allows_system_namespace: true
        forbids_dot_traversal: true
    docs:
      usage: references/tooling/Cli_Toolbox_USAGE.md
      development: references/tooling/Cli_Toolbox_DEVELOPMENT.md
      module: references/tooling/development/modules/mod_sync_mirror.md
