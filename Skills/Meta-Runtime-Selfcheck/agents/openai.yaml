interface:
  display_name: "Meta-Runtime-Selfcheck"
  short_description: "Turn hook runtime self-repair contract. Throughout the active turn, start when issue evidence appears, repair first inside the current boundary, and merge repair outcomes into the final reply."
  default_prompt: "Use Meta-Runtime-Selfcheck as the default turn hook runtime self-repair contract. First run `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py runtime-contract --json`. When issue evidence appears anywhere in the turn, immediately read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic turn-hook-self-repair --json`, then read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic self-repair-writeback --json` and apply the minimal verifiable repair before continuing. Before the final reply, read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic final-reply-merge --json` and merge repaired items, verification results, and any residual risk into the same reply."

policy:
  allow_implicit_invocation: true
