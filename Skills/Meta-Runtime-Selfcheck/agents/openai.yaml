interface:
  display_name: "Meta-Runtime-Selfcheck"
  short_description: "Turn-end runtime selfcheck contract. Before final reply, skip when the run is smooth; otherwise diagnose stalls, tool/path mistakes, hesitation, and merge actionable optimization items into the same final reply."
  default_prompt: "Use Meta-Runtime-Selfcheck as the default turn-end selfcheck contract. First run `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py runtime-contract --json`; then read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic turn-end-selfcheck --json`. If selfcheck detects bounded issues that can be safely fixed in the same turn, read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic self-repair-writeback --json`. If selfcheck finds user-visible improvement points, read `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Selfcheck/scripts/Cli_Toolbox.py directive --topic final-reply-merge --json` and merge concise remediation items into the same final reply. Skip emitting selfcheck content when the run is smooth."

policy:
  allow_implicit_invocation: true
