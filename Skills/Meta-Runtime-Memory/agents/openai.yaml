interface:
  display_name: "Meta-Runtime-Memory"
  short_description: "turn hook 常驻 memory contract，强制加载用户层与任务层 memory，并按条件写回。"
  default_prompt: "使用 $Meta-Runtime-Memory 作为 turn hook。先执行 `./.venv_backend_skills/bin/python Skills/Meta-Runtime-Memory/scripts/Cli_Toolbox.py runtime-contract --json`。默认通过 `watch-codex-sessions` 消费 Codex session stream，在 turn start 自动写入 `ACTIVE_RUNTIME.json + SESSION_MEMORY.json + TURN_AUDIT.json` 并编译 active memory；在 turn end 自动执行 writeback check，即使 skipped 也要留下 turn audit。`bind-task` 与 `append-turn-delta` 只作为人工修复/迁移入口，不再用于制造 turn hook 已生效的假证据。"

policy:
  allow_implicit_invocation: true
