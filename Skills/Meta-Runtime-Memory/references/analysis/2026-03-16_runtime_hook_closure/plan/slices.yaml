slices:
  - slice_id: slice_01_hook_audit_backbone
    status: completed
    goal: 建立 session-stream watcher 与 turn-start/turn-end 审计骨架。
    scope:
      - memory_session_runtime.py
      - memory_store.py
      - memory_models.py
      - Cli_Toolbox.py
    acceptance:
      - watcher 能消费真实 Codex session JSONL
      - turn_start_loaded 与 turn_end_checked 自动写 machine/human log
      - turn audit 可通过 show-turn-audit 读回
  - slice_id: slice_02_auto_binding_and_durable_memory
    status: completed
    goal: 在真实 user_message 上自动绑定 task，并把 applied turn 写入 durable task memory 与 turn delta。
    scope:
      - 自动 task_id 派生
      - TASK_MEMORY/TURN_DELTA 自动更新
      - recall-memory/search-memory CLI
    acceptance:
      - 不调用 bind-task 也能形成 task 目录与 durable memory
      - recall/search 能读回 applied turn 证据
  - slice_id: slice_03_validation_and_regression_closure
    status: completed
    goal: 用真实后台 watcher + 真实 codex exec + 回归测试闭合缺陷。
    scope:
      - test_cli_toolbox.py
      - live5 隔离根验证
      - failure contrast 记录
    acceptance:
      - pytest 通过
      - 真实 skipped 与 applied turn 都被 watcher 自动记录
      - validate-store/recall/search 返回与落地产物一致
