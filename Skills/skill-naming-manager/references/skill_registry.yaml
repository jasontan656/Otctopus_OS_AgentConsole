      - canonical_id: "meta-reasoning-chain"
        display_name: "Meta-Reasoning-Chain"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "reasoning-contract"
        status: "active"
        trigger_summary: "当需要对非平凡讨论、规划、设计或评审回合强制输出单层混合推理链并形成可决策结论时使用。"
      - canonical_id: "meta-architect-mindmodel"
        display_name: "Meta-Architect-MindModel"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "architect-first-lens"
        status: "active"
        trigger_summary: "当需要以 architect-first 视角评估整体架构影响、边界清晰度与长期整洁性，并在局部请求与整体结构冲突时给出更干净替代方案时使用。"
      - canonical_id: "meta-runtime-selfcheck"
        display_name: "Meta-Runtime-Selfcheck"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "runtime-selfcheck"
        status: "active"
        trigger_summary: "当任务或运行结束后，需要复盘上一回合中的犹豫、工具失败、脚本失败、引导不足、模型 confused 与迷宫式流程时使用。"
      - canonical_id: "meta-github-operation"
        display_name: "Meta-github-operation"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "github-control-plane"
        status: "active"
        trigger_summary: "当需要在受限仓库范围内执行 Git 状态检查、提交、推送、baseline 或 rollback 合同时使用。"
      - canonical_id: "meta-semantic-collection"
        display_name: "Meta-Semantic-Collection"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "semantic-pool"
        status: "active"
        trigger_summary: "当需要在 turn start 加载用户语义词池，或在用户澄清语义、纠正误解时维护动作语义映射时使用。"
      - canonical_id: "meta-rootfile-manager"
        display_name: "Meta-RootFile-Manager"
        prefix: "meta"
        family: "[Meta]"
        role_tag: "rootfile-governance"
        status: "active"
        trigger_summary: "当需要集中治理 workspace 或 repo root 的默认文件、按文件类型开通独立受管通道、回收或回推出这些 root file 时使用。"
  - family: "[WorkFlow]"
    description: "各类自动化的工作流统一管理."
    members:
      - canonical_id: "workflow-octopusos-devflow"
        display_name: "Workflow-OctopusOS-DevFlow"
        prefix: "workflow"
        family: "[WorkFlow]"
        role_tag: "octopus-devflow"
        status: "draft"
        trigger_summary: "当需要使用从 Disabled-Octupos-OS-Backend 复制出的四阶段 mother_doc -> construction_plan -> implementation -> acceptance 闭环 workflow 骨架，并准备后续逐步通用化时使用。"
      - canonical_id: "workflow-realstate-posting-web"
        display_name: "WorkFlow-RealState-Posting-Web"
        prefix: "workflow"
        family: "[WorkFlow]"
        role_tag: "real-estate-posting-router"
        status: "active"
        trigger_summary: "当进行房源发布类网页自动化，需要按无头或有头模式进入固定工作流并绑定 HouseSale 资产时使用。"
