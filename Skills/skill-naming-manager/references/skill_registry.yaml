    members:
      - canonical_id: "dev-vue3-webui-frontend"
        display_name: "Dev-VUE3-WebUI-Frontend"
        prefix: "dev"
        family: "[DEV]"
        role_tag: "frontend-standards-showroom"
        status: "active"
        trigger_summary: "当进行前端开发，需要项目定制 Vue3 组件使用方式、自包含 UI 界面、展厅级可视化效果与前端规范时必须使用。"
      - canonical_id: "dev-octopusos-constitution-projectstructure"
        display_name: "Dev-OctopusOS-Constitution-ProjectStructure"
        prefix: "dev"
        family: "[DEV]"
        role_tag: "project-structure-governance"
        status: "active"
        trigger_summary: "当需要定义或查询章鱼OS整体架构、项目结构、模块热插拔边界、底座能力 bundle 边界，或为目录/容器规划与未来 lint 门禁提供项目级治理依据时使用。"
  - family: "[Disabled]"
    description: "临时关闭不使用的技能，可能会遗弃，可被修改。"
    members:
      - canonical_id: "disabled-octupos-fullstack"
        display_name: "Disabled-Octupos-FullStack"
        prefix: "disabled"
        family: "[Disabled]"
        role_tag: "octopus-fullstack"
        status: "deprecated"
        trigger_summary: "默认停用，避免误触发；仅在明确要求查看、迁移、改造或重新启用历史章鱼全栈技能时使用。"
      - canonical_id: "disabled-octupos-os-backend"
        display_name: "Disabled-Octupos-OS-Backend"
        prefix: "disabled"
        family: "[Disabled]"
        role_tag: "octopus-backend"
        status: "deprecated"
        trigger_summary: "默认停用，避免误触发；仅在明确要求查看、迁移、改造或重新启用历史章鱼后端技能时使用。"
  - family: "[Functional]"
    description: "功能化组件技能，用于各个适用域的小任务。"
    members:
      - canonical_id: "functional-codex-branch-session-chat"
        display_name: "Functional-CodexBranchSession-Chat"
        prefix: "functional"
        family: "[Functional]"
        role_tag: "branch-session-chat"
        status: "active"
        trigger_summary: "当用户提供 resume_id 或 session_id，并希望基于历史会话证据直接提问答疑时使用。"
  - family: "[Meta]"
    description: "元技能,常用于自动化运行,必须常驻."
