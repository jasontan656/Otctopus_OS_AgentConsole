registry_version: v1
families:
  - family: "[SKILL-GOV]"
    description: "治理技能命名、注册、模板、镜像同步与同类治理动作的技能族。"
    members:
      - canonical_id: "skill-naming-manager"
        display_name: "Skill-Naming-Manager"
        prefix: "skill"
        family: "[SKILL-GOV]"
        role_tag: "manager"
        status: "active"
        trigger_summary: "当需要统一治理技能命名、prefix/family 归类、registry 注册与自然语言调用语义时使用。"
      - canonical_id: "skill-mirror-to-codex"
        display_name: "Skill-Mirror-to-Codex"
        prefix: "skill"
        family: "[SKILL-GOV]"
        role_tag: "mirror-sync"
        status: "active"
        trigger_summary: "当需要把 mirror 中的技能同步或安装到 codex skills 目录时使用。"
      - canonical_id: "skill-doc-structure"
        display_name: "Skill-Doc-Structure"
        prefix: "skill"
        family: "[SKILL-GOV]"
        role_tag: "doc-structure"
        status: "active"
        trigger_summary: "当需要治理 skills 内部文档组织、单 topic 原子文档、锚点图谱与文档结构 runtime 时使用。"
      - canonical_id: "skill-creation-template"
        display_name: "Skill-Creation-Template"
        prefix: "skill"
        family: "[SKILL-GOV]"
        role_tag: "template"
        status: "active"
        trigger_summary: "当需要用统一模板创建、改造或治理 skills 骨架时使用。"
      - canonical_id: "skills-tooling-checkup"
        display_name: "Skills-Tooling-CheckUp"
        prefix: "skill"
        family: "[SKILL-GOV]"
        role_tag: "tooling-checkup"
        status: "active"
        trigger_summary: "当需要按 repo 已声明的必用依赖栈检查已安装 skills 内部 tooling code 是否自造轮子，并在必要时推动修正时使用。"
  - family: "[Skill_prod]"
    description: "围绕 console 产品化、Skills 目录产品形态与相关 continuity 技能管理的技能族。"
    members:
      - canonical_id: "skill-production-form"
        display_name: "Skill-Production-Form"
        prefix: "skill"
        family: "[Skill_prod]"
        role_tag: "console-product-form"
        status: "active"
        trigger_summary: "当需要持续维护 console 目录的产品形态、沉淀 Skills 目录产品化历史，并为后续技能治理提供稳定连续性上下文时使用。"
  - family: "[DEV]"
