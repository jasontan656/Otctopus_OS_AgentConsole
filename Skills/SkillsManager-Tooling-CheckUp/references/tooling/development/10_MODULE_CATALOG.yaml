catalog_version: v1
toolbox_name: Cli_Toolbox
has_local_toolbox: true
maintain_rules:
  naming: "Cli_Toolbox.<tool_name>"
  docs_sync_required: true
  required_docs:
    - references/tooling/Cli_Toolbox_USAGE.md
    - references/tooling/Cli_Toolbox_DEVELOPMENT.md
    - references/tooling/development/20_CATEGORY_INDEX.md
    - references/runtime_contracts/
skill_mode_support:
  - guide_only
  - guide_with_tool
  - executable_workflow_skill
modules:
  - module_id: contract
    entrypoint: scripts/Cli_Toolbox.py
    tool_aliases:
      - Cli_Toolbox.contract
    docs:
      usage: references/tooling/Cli_Toolbox_USAGE.md
      development: references/tooling/development/modules/mod_contract.md
    responsibilities:
      - "输出 skills runtime contract JSON"
      - "暴露 directive topic 索引与主运行时约束"
  - module_id: directive
    entrypoint: scripts/Cli_Toolbox.py
    tool_aliases:
      - Cli_Toolbox.directive
    docs:
      usage: references/tooling/Cli_Toolbox_USAGE.md
      development: references/tooling/development/modules/mod_directive.md
    responsibilities:
      - "按 topic 输出 contract/workflow/instruction/guide payload"
      - "保证模型先吃 JSON，再按需补 human markdown"
  - module_id: govern_target
    entrypoint: scripts/Cli_Toolbox.py
    tool_aliases:
      - Cli_Toolbox.govern_target
    docs:
      usage: references/tooling/Cli_Toolbox_USAGE.md
      development: references/tooling/development/modules/mod_govern_target.md
    responsibilities:
      - "对目标 skill 输出形态治理审计结果"
      - "按 skill_mode 分流 shape 审计边界"
