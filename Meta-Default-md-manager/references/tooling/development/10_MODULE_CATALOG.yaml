modules:
  - name: cli_parser_support
    path: scripts/cli_parser_support.py
    responsibility: 定义 CLI 子命令和参数
  - name: managed_guidance
    path: scripts/managed_guidance.py
    responsibility: 读取 machine-readable 合同并生成 markdown 审计版
  - name: managed_scan
    path: scripts/managed_scan.py
    responsibility: 生成 scan_report.json
  - name: managed_paths
    path: scripts/managed_paths.py
    responsibility: 解析 skill/source 路径、默认目标规则与各类产物路径
  - name: managed_registry
    path: scripts/managed_registry.py
    responsibility: registry 读写与条目构造
  - name: managed_index
    path: scripts/managed_index.py
    responsibility: 生成受管默认文档索引页
  - name: managed_lock
    path: scripts/managed_lock.py
    responsibility: 对 scan collect push 提供互斥锁
  - name: managed_collect
    path: scripts/managed_collect.py
    responsibility: 基于 scan_report 回收默认文档
  - name: managed_push
    path: scripts/managed_push.py
    responsibility: 从托管副本回写原始文件
