catalog_version: v2
toolbox_name: Cli_Toolbox
maintain_rules:
  naming: "Cli_Toolbox.<tool_name>"
  docs_sync_required: true
  required_docs:
    - references/tooling/Cli_Toolbox_USAGE.md
    - references/tooling/Cli_Toolbox_DEVELOPMENT.md
    - references/runtime/SKILL_DOCSTRUCTURE_RUNTIME_CONTRACT.json
    - ui-dev/UI_DEV_ENTRY.md
    - ui-dev/docs/UI_TOOL_POSITIONING.md
    - ui-dev/docs/UI_FILE_ORGANIZATION.md
    - ui-dev/docs/VIEWER_STACK_AND_REUSE.md
modules:
  - module_id: docstructure_core
    tool_alias:
      - Cli_Toolbox.runtime_contract
      - Cli_Toolbox.lint_doc_anchors
      - Cli_Toolbox.build_anchor_graph
      - Cli_Toolbox.rebuild_self_graph
    entrypoint: scripts/Cli_Toolbox.ts
    status: active
    doc: references/tooling/development/modules/mod_docstructure_core.md
  - module_id: viewer_runtime
    tool_alias:
      - viewer.dev
      - viewer.start
      - viewer.service_install
    entrypoint: ui-dev/server/viewer-server.ts
    status: active
    doc: references/tooling/development/modules/mod_viewer_runtime.md
