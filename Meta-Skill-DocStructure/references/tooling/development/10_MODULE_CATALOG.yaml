catalog_version: v1
toolbox_name: Cli_Toolbox
maintain_rules:
  naming: "Cli_Toolbox.<tool_name>"
  docs_sync_required: true
  required_docs:
    - references/tooling/Cli_Toolbox_USAGE.md
    - references/tooling/Cli_Toolbox_DEVELOPMENT.md
    - references/runtime/SKILL_DOCSTRUCTURE_RUNTIME_CONTRACT.json
    - assets/runtime/anchor_query_matrix.json
modules:
  - module_id: runtime_contract
    tool_alias: Cli_Toolbox.runtime_contract
    entrypoint: scripts/Cli_Toolbox.py runtime-contract
    status: active
    doc: references/tooling/development/modules/mod_runtime_contract.md
  - module_id: anchor_graph_lint
    tool_alias:
      - Cli_Toolbox.lint_doc_anchors
      - Cli_Toolbox.build_anchor_graph
      - Cli_Toolbox.rebuild_self_graph
    entrypoint: scripts/Cli_Toolbox.py lint-doc-anchors|build-anchor-graph|rebuild-self-graph
    status: active
    doc: references/tooling/development/modules/mod_anchor_graph_lint.md
